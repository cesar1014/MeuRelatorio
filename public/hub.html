<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma de Projetos | Gestao Orcamentaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="hub-page">
  <header class="hub-nav">
    <div class="hub-nav-inner">
      <a href="/hub" class="hub-brand">PROJETOS</a>

      <div class="hub-nav-actions">
        <a id="hub-report-link" class="hub-nav-link" href="/?view=relatorios">Relatorio</a>
        <a id="hub-admin-link" class="hub-nav-link" href="/admin" hidden>Administracao</a>
        <button id="hub-theme-toggle" class="hub-nav-link" type="button">Modo escuro</button>
        <button id="hub-logout" class="hub-nav-link" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="hub-layout">
    <section class="hub-hero">
      <div class="hub-hero-copy">
        <h1 id="hub-greeting">Ola</h1>
        <p id="hub-subtitle">Projetos disponiveis para acesso.</p>
      </div>
      <a id="hub-new-project" class="hub-new-project btn btn-primary" href="/admin" hidden>+ Novo Projeto</a>
    </section>

    <section class="hub-toolbar">
      <div class="hub-filter-row">
        <label class="hub-search-field" for="hub-search">
          <input id="hub-search" type="search" placeholder="Procurar por codigo ou nome do projeto..." />
        </label>

        <label class="hub-department-field" for="hub-department">
          <select id="hub-department" aria-label="Departamentos">
            <option value="">Departamentos</option>
          </select>
        </label>

        <div id="hub-status-tabs" class="hub-tabs" role="tablist" aria-label="Filtro por status"></div>

        <button id="hub-clear-filters" class="hub-filter-reset" type="button" title="Limpar filtros">Limpar</button>
      </div>
      <div id="hub-status" class="hub-status"></div>
    </section>

    <section id="hub-empty" class="hub-empty" hidden></section>
    <section id="hub-grid" class="hub-grid" aria-live="polite"></section>
  </main>

  <script src="./encoding-guard.js"></script>
  <script src="./hub.js" type="module"></script>
</body>

</html>
