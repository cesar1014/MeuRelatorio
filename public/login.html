<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Login | Gestão Orçamentária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* Keep light theme background clean white */
    body.login-page {
      background: #ffffff;
      min-height: 100vh;
      overflow: hidden;
    }

    body.login-page.theme-dark {
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(37, 99, 235, 0.12), transparent 50%),
        radial-gradient(ellipse 70% 50% at 80% 70%, rgba(99, 102, 241, 0.1), transparent 50%),
        radial-gradient(ellipse 90% 80% at 50% 50%, rgba(5, 10, 20, 0.95), transparent 80%),
        linear-gradient(135deg, #050810 0%, #0a1020 40%, #0d1628 70%, #060c18 100%);
    }

    /* Animated floating orbs */
    .login-bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
      display: none;
    }

    body.login-page.theme-dark .login-bg-orb {
      display: block;
    }

    .login-bg-orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.4), transparent 70%);
      top: -100px;
      left: -80px;
      animation: orbFloat1 12s ease-in-out infinite;
    }

    .login-bg-orb-2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.35), transparent 70%);
      bottom: -60px;
      right: -40px;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    .login-bg-orb-3 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.25), transparent 70%);
      top: 50%;
      left: 60%;
      animation: orbFloat3 18s ease-in-out infinite;
    }

    @keyframes orbFloat1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, 30px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 50px) scale(0.95);
      }
    }

    @keyframes orbFloat2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(-30px, -40px) scale(1.05);
      }

      66% {
        transform: translate(20px, -20px) scale(0.9);
      }
    }

    @keyframes orbFloat3 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-40px, 30px) scale(1.15);
      }
    }

    /* Fade-in for the shell */
    .login-shell {
      animation: loginFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      position: relative;
      z-index: 1;
      border-color: rgba(100, 140, 220, 0.2);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(100, 140, 220, 0.1);
    }

    body.login-page:not(.theme-dark) .login-shell {
      border-color: rgba(148, 163, 184, 0.35);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    @keyframes loginFadeUp {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Login card improvements */
    .login-card {
      background: var(--bg-surface);
    }

    body.login-page:not(.theme-dark) .login-card {
      background: #fff;
    }

    /* Brand panel improvements */
    .login-brand-panel {
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.85)),
        radial-gradient(circle at 30% 80%, rgba(59, 130, 246, 0.2), transparent 60%);
      border-right: 1px solid rgba(100, 140, 220, 0.12);
    }

    /* Theme toggle */
    .login-theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.15rem;
      color: rgba(200, 210, 230, 0.8);
      transition: all 0.25s ease;
      z-index: 100;
      backdrop-filter: blur(12px);
      animation: loginFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    body.login-page:not(.theme-dark) .login-theme-toggle {
      background: #ffffff;
      border-color: #cbd5e1;
      color: #1e293b;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
      backdrop-filter: none;
    }

    .login-theme-toggle:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: scale(1.1) rotate(15deg);
      color: #fff;
    }

    body.login-page:not(.theme-dark) .login-theme-toggle:hover {
      background: #f8fafc;
      color: #0f172a;
    }

    /* Subtle noise texture overlay */
    body.login-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Grid lines subtle background effect */
    body.login-page::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 140, 220, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 140, 220, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 70% 50% at 50% 50%, black, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 50% at 50% 50%, black, transparent 80%);
    }

    body.login-page:not(.theme-dark)::before,
    body.login-page:not(.theme-dark)::after {
      content: none;
    }

    .login-layout {
      position: relative;
      z-index: 1;
    }
  </style>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) document.documentElement.classList.add('theme-dark-early');
    })();
  </script>
</head>

<body class="login-page">
  <!-- Animated background orbs -->
  <div class="login-bg-orb login-bg-orb-1"></div>
  <div class="login-bg-orb login-bg-orb-2"></div>
  <div class="login-bg-orb login-bg-orb-3"></div>

  <main class="login-layout">
    <section class="login-shell" aria-labelledby="login-title">
      <aside class="login-brand-panel">
        <div class="brand">
          <div class="brand-info">
            <h1>PROJETOS</h1>
            <p>Gestão Orçamentária</p>
          </div>
        </div>
        <p class="login-brand-copy">
          Plataforma de gestão orçamentária com acesso restrito para acompanhamento financeiro institucional.
        </p>
      </aside>

      <section class="card login-card">
        <h2 id="login-title">Acessar sistema</h2>
        <p class="login-subtitle">Informe seu usuário (ou login do projeto) e a senha para entrar no painel.</p>

        <form id="login-form" novalidate>
          <div class="field login-field">
            <label for="username">Usuário ou projeto</label>
            <input id="username" name="username" autocomplete="username" required />
            <small id="project-hint" class="field-hint">Exemplo: FELLOW</small>
          </div>
          <div class="field login-field">
            <label for="password">Senha</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button id="submit-btn" type="submit" class="btn btn-primary login-submit">Entrar</button>
          <div id="error-message" class="error login-error" role="alert" aria-live="polite"></div>
        </form>
      </section>
    </section>
  </main>

  <button id="login-theme-toggle" class="login-theme-toggle" type="button" title="Alternar tema">🌙</button>

  <script src="./encoding-guard.js"></script>
  <script src="./login.js" type="module"></script>
</body>

</html>
